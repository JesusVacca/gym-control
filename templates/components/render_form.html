{% for field in form %}
    <div class="form__group">
        <label
                class="form__label"
                for="{{ field.id_for_label }}"
                {% if field.field.required %}
                data-required="True"
                {% endif %}
        >{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
            {% for error in field.errors %}
                <p class="form__error">{{ error }}</p>
            {% endfor %}
        {% endif %}
    </div>
{% endfor %}
